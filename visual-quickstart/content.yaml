    - 'pytest    # run the new tests'
- badge: Chapter 04
  title: Agents and Custom Instructions
  subtitle: Hire built-in and custom agents, and set project standards once with AGENTS.md.
  selector: Agents · specialists & AGENTS.md
  panels:
  - img: ch04-agents.png
    alt: Pip stands with arms crossed beside specialist icons and Professor Quill.
    caption: Hire a specialist
    bubbles:
    - lines:
      - An agent is a specialist
      - I can hire for a job.
      w: 520
      tx: 400
      ty: 210
    - lines:
      - Right expert,
      - right task.
      w: 420
      tx: 900
      ty: 500
    term:
    - copilot
    - '> /agent          # list and pick an agent'
  - img: ch04-builtin.png
    alt: Pip gives a thumbs up beside a laptop showing a checklist and a badge.
    caption: Built-in agents
    bubble:
      lines:
      - Some agents are built in.
      - Just type a slash command.
      w: 560
      tx: 560
      ty: 240
    term:
    - '> /review     # built-in code-review agent'
    - '> /plan       # built-in planning agent'
  - img: ch04-custom.png
    alt: Pip proudly holds a page showing a gear icon, representing a custom agent.
    caption: Make your own agent
    bubble:
      lines:
      - Write your own agent in a
      - simple markdown file.
      w: 560
      tx: 600
      ty: 300
    term:
