  - img: ch04-instructions.png
    alt: Pip gestures toward a laptop with a gear while Professor Quill watches.
    caption: Set project standards once
    bubbles:
    - lines:
      - Put your rules in AGENTS.md.
      w: 560
      tx: 600
      ty: 230
    - lines:
      - Set standards once -
      - Copilot follows them.
      w: 540
      tx: 1300
      ty: 560
    term:
    - '# Add an AGENTS.md file to your repo'
    - '# Copilot reads it automatically'
