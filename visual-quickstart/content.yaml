# Editable content for the Pip comic site.
# Edit the words here, then rebuild with build_site.py.
# The skill owns the rendering engine; this file owns the content.
# Per bubble: lines (the speech text), w (bubble width px),
# tx/ty (the speaker's head x/y - the tail points there).

home:
  title_html: GitHub Copilot CLI<br>for Beginners
  subtitle: A visual quickstart guide to the GitHub Copilot CLI.
  cta_text: Get Started!
  cta_href: chapter-00.html
  intro:
    img: ch00-welcome.png
    alt: Pip the fox waves hello beside Professor Quill the owl at a cozy desk with a laptop.
    caption: Meet Pip and Professor Quill - pick a chapter below to get started!
    bubbles:
    - lines:
      - Hi, I'm Pip! Let's get setup
      - to code together!
      w: 720
      tx: 540
      ty: 250
    - lines:
      - And I'm Professor Quill. I explain
      - the why behind each step.
      w: 640
      tx: 1140
      ty: 560
footer_html: <a href="https://github.com/github/copilot-cli-for-beginners">GitHub
  Copilot CLI for Beginners course</a>.
chapters:
- badge: Chapter 00
  title: Quick Start
  subtitle: Install GitHub Copilot CLI, sign in, clone the samples, and verify it works.
  selector: Quick Start · install, sign in, verify
  panels:
  - img: ch00-install.png
    alt: Pip gives a thumbs up as software installs onto a laptop.
    caption: Install the CLI
    bubble:
      lines:
      - Got Node.js or Homebrew? One
      - command and we're up and running!
      w: 720
      tx: 645
      ty: 130
    term:
    - npm install -g @github/copilot
    - 'brew install copilot-cli      # macOS / Linux alternative'
  - img: ch00-login.png
    alt: Pip holds a key beside Professor Quill, who shows a phone with a security shield.
    caption: Sign in securely
    bubbles:
    - lines:
      - Start Copilot, then log in.
      - Confirm the code in your browser.
      w: 660
      tx: 520
      ty: 260
    - lines:
      - Your sign-in stays safe. The
      - code proves it is really you.
      w: 620
      tx: 1010
      ty: 540
    term:
    - copilot
    - '> /login'
  - img: ch00-clone.png
    alt: Pip copies a folder of project files onto a laptop from a cloud.
    caption: Clone the sample project
    bubble:
      lines:
      - Grab the course samples so we
      - have something to build with!
      w: 680
      tx: 660
      ty: 300
    term:
    - git clone https://github.com/github/copilot-cli-for-beginners
    - cd copilot-cli-for-beginners
  - img: ch00-verify.png
    alt: Pip points at a laptop showing books and a green check.
    caption: Verify it works
    bubble:
      lines:
      - Let's run the sample book app.
      - See five books? We're good to go!
      w: 620
      tx: 430
      ty: 180
    term:
    - cd samples/book-app-project
    - python book_app.py list
  - img: ch00-ready.png
    alt: Pip cheers beside Professor Quill, who gives a thumbs up next to a trophy.
    caption: You're ready!
    bubbles:
    - lines:
      - Setup complete! The real
      - fun starts in Chapter 01.
      w: 560
      tx: 500
      ty: 185
    - lines:
      - Well done. You
      - earned this trophy!
      w: 470
      tx: 960
      ty: 500
- badge: Chapter 01
  title: First Steps
  subtitle: See Copilot CLI in action, then learn the three interaction modes.
  selector: First Steps · demos & the three modes
  panels:
  - img: ch01-magic.png
    alt: Pip looks amazed beside Professor Quill as magic sparkles rise from a laptop.
    caption: Chapter 01 - The magic begins
    bubbles:
    - lines:
      - Just ask in plain English.
      - Watch what happens!
      w: 600
      tx: 540
      ty: 240
    - lines:
      - No secret syntax to learn.
      - Say it your way!
      w: 550
      tx: 1160
      ty: 500
    term:
    - copilot
    - '> Explain what a dataclass is in Python in simple terms'
  - img: ch01-review.png
    alt: Pip inspects code bugs on a laptop with a magnifying glass.
    caption: Demo - Code review in seconds
    bubble:
      lines:
      - Point me at a file and I'll
      - spot bugs and quality issues!
      w: 560
      tx: 700
      ty: 330
    term:
    - '> Review @samples/book-app-project/book_app.py for code quality issues'
  - img: ch01-modes.png
    alt: Professor Quill points at three icons - a map, a waiter, and a drive-through - while Pip thinks.
    caption: 'Three modes: GPS route, waiter chat, or drive-through'
    bubbles:
    - lines:
      - Plan =
      - a GPS route.
      - Interactive =
      - a waiter chat.
      - Programmatic =
      - a drive-through.
      w: 358
      tx: 470
      ty: 610
    - lines:
      - I'll pick the one
      - that fits the job.
      w: 400
      tx: 1190
      ty: 195
    term:
    - 'copilot              # Interactive - explore and iterate'
    - 'copilot --plan       # Plan - map it out first'
    - 'copilot -p "..."     # Programmatic - one-shot answer'
  - img: ch01-commands.png
    alt: Pip operates a colorful control panel of buttons.
    caption: Control your session
    bubble:
      lines:
      - Forgot a command? Type /help.
      - Switching topics? Use /clear.
      - All done? Type /exit!
      w: 640
      tx: 800
      ty: 320
    term:
    - '/help     # show all commands'
    - '/clear    # start a fresh conversation'
    - '/model    # show or switch the AI model'
    - '/plan     # plan before coding'
    - '/exit     # end the session'
  - img: ch01-next.png
    alt: Pip waves goodbye beside Professor Quill while walking toward a glowing arrow.
    caption: On to Chapter 02!
    bubbles:
    - lines:
      - 'Next: give me context'
      - with the @ symbol.
      - See you in Chapter 02!
      w: 500
      tx: 600
      ty: 250
    - lines:
      - Keep going -
      - you're doing great!
      w: 440
      tx: 950
      ty: 490
- badge: Chapter 02
  title: Context and Conversations
  subtitle: Point Copilot at your files with the @ symbol and resume work across sessions.
  selector: Context · the @ symbol & sessions
  panels:
  - img: ch02-context.png
    alt: Pip gestures while explaining to Professor Quill at a desk with a laptop showing code.
    caption: Give Copilot context
    bubbles:
    - lines:
      - Copilot is not a mind reader.
      - Give it the right files!
      w: 560
      tx: 470
      ty: 210
    - lines:
      - Context turns a guess
      - into a real answer.
      w: 470
      tx: 760
      ty: 250
    term:
    - copilot
    - '> Review @samples/book-app-project/books.py'
  - img: ch02-atsyntax.png
    alt: Pip points at a laptop showing a file and an @ symbol.
    caption: Point with the @ symbol
    bubble:
      lines:
      - Type @ then a file or folder
      - to point me right at the code.
      w: 600
      tx: 600
      ty: 210
    term:
    - '> Explain what @samples/book-app-project/utils.py does'
  - img: ch02-multifile.png
    alt: Pip holds up two pages of code, comparing them side by side.
    caption: Cross-file intelligence
    bubble:
      lines:
      - Point at many files at once.
      - I spot bugs that hide between them.
      w: 660
      tx: 600
      ty: 300
    term:
    - '> Compare @samples/book-app-project/book_app.py'
    - '  @samples/book-app-project/books.py for consistency'
  - img: ch02-sessions.png
    alt: Pip stands beside Professor Quill near a laptop showing a refresh and clock icon.
    caption: Resume any conversation
    bubbles:
    - lines:
      - Stopped for the day?
      - Pick up where we left off.
      w: 560
      tx: 640
      ty: 210
    - lines:
      - Sessions save automatically.
      - Nothing is lost.
      w: 600
      tx: 1180
      ty: 560
    term:
    - 'copilot --continue    # resume your last session'
    - 'copilot --resume      # or pick one from a list'
- badge: Chapter 03
  title: Development Workflows
  subtitle: Review, refactor, debug, test, and ship code with everyday Copilot workflows.
