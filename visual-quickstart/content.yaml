      - refactor, debug, test, ship.
      w: 600
      tx: 840
      ty: 210
    - lines:
      - Pick the workflow
      - that fits the task.
      w: 470
      tx: 390
      ty: 470
    term:
    - copilot
    - '> Review @samples/book-app-project/book_app.py for code quality'
  - img: ch03-review.png
    alt: Pip inspects a laptop with a magnifying glass, spotting issues in code.
    caption: Code review
    bubble:
      lines:
      - Point me at a file and I
      - flag bugs and quality issues.
      w: 560
      tx: 560
      ty: 240
    term:
    - '> Review @samples/book-app-project/book_app.py for code quality'
  - img: ch03-debug.png
    alt: Pip wears a detective hat and uses a magnifying glass to find a bug on a laptop.
    caption: The bug detective
    bubble:
      lines:
      - Show me the error and the file.
      - I track the bug down.
      w: 600
      tx: 560
      ty: 250
    term:
    - '> Why does this fail? Find the bug in'
    - '  @samples/book-app-project/books.py'
  - img: ch03-test.png
    alt: Pip gives a thumbs up beside Professor Quill near a laptop showing green checkmarks.
    caption: Refactor, test, and ship
    bubbles:
    - lines:
      - Refactor it, test it,
      - then ship it with git.
      w: 520
      tx: 600
      ty: 210
    - lines:
      - Tests are your safety net.
      - Always run them.
      w: 560
      tx: 1180
      ty: 540
    term:
